<div id="app"></div>

<script>
const SECTIONS_CONFIG = [
  { id: "upcoming", label: "المباريات القادمة", icon: "📅", queryTpl: (d, iso) => `Today is ${d} (${iso}). What is Al Ahly SC Egypt's NEXT upcoming match AFTER today ${iso}? Include date, time, opponent, competition, TV channels, and expected lineup if available. Search for "الأهلي المباراة القادمة" and "Al Ahly next match".` },
  { id: "results", label: "آخر النتائج", icon: "⚽", queryTpl: (d, iso) => `Today is ${d} (${iso}). What are Al Ahly SC Egypt's most recent match results? Include the last 2-3 matches with final scores, goal scorers, and competition name. Search for "نتيجة مباراة الأهلي" and "Al Ahly results".` },
  { id: "insider", label: "كواليس النادي", icon: "🏟️", queryTpl: (d, iso) => `Today is ${d} (${iso}). Search for the latest Al Ahly SC internal news, board of directors decisions, coaching staff changes, player disputes, dressing room rumors, and behind-the-scenes stories. Search for "كواليس الأهلي", "أخبار مجلس إدارة الأهلي", "أخبار الأهلي اليوم", "إشاعات الأهلي", and "Al Ahly insider news board coaching staff". Include both confirmed news and rumors — clearly label which is confirmed and which is rumor/إشاعة.` },
  { id: "transfers", label: "أخبار الانتقالات", icon: "💰", queryTpl: (d, iso) => `Today is ${d} (${iso}). What are the latest Al Ahly SC Egypt transfer news, rumors, and signings? Search for "صفقات الأهلي" and "انتقالات الأهلي" and "Al Ahly transfers signings".` },
  { id: "standings", label: "ترتيب الدوري", icon: "🏆", queryTpl: (d, iso) => `Today is ${d} (${iso}). What are the current Egyptian Premier League 2025-2026 standings? Show the full table with positions, points, wins, draws, losses, and goal difference. Search for "ترتيب الدوري المصري" and "Egyptian Premier League standings".` },
];

const LOADING_MSGS = [
  "بنجيبلك الأخبار... ⚽", "بنفتش في فيلجول ويلاكورة... 🔴",
  "بنسأل مصادرنا في الجزيرة... 🏟️", "جاري التحميل يا أهلاوي... 🦅",
  "بنكلم مصادر من جوا النادي... 🤫", "الأهلي فوق الجميع... ❤️",
  "ثانية واحدة يا معلم... ⏳", "بنجمع المعلومات من كل حتة... 📡",
];

function getTodayAr() {
  return new Date().toLocaleDateString('ar-EG', { weekday:'long', year:'numeric', month:'long', day:'numeric', timeZone:'America/New_York' });
}
function getTodayEN() {
  return new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric', timeZone:'America/New_York' });
}
function getTodayISO() {
  return new Date().toLocaleDateString('en-CA', { timeZone:'America/New_York' });
}

function getSystemPrompt() {
  const d = getTodayEN(), iso = getTodayISO();
  return `أنت مراسل رياضي متخصص في أخبار النادي الأهلي المصري. شغلتك تجيب أحدث وأدق المعلومات عن الأهلي.

مهم جداً — تاريخ النهاردة: ${d} (${iso}) بتوقيت شرق أمريكا (ET). أي مباراة تاريخها قبل النهاردة تعتبر نتيجة ماضية مش مباراة قادمة.

القواعد:
- الرد يكون بالعربي بس (لهجة مصرية مفضلة)
- للمباريات القادمة: اذكر التاريخ، الوقت بتوقيت شرق أمريكا ET وتوقيت القاهرة، المنافس، البطولة، القنوات الناقلة (beIN Sports, OnTime Sports, SSC, الخ)، والتشكيل المتوقع لو متاح
- للنتائج: النتيجة النهائية، الهدافين، البطولة، التاريخ
- لأخبار الانتقالات: أسماء اللاعبين، المراكز، الأرقام المتداولة، المصادر
- لكواليس النادي: قرارات مجلس الإدارة، أخبار الجهاز الفني، مشاكل اللاعبين، إشاعات أوضة اللبس — وضّح إيه المؤكد وإيه الإشاعة
- للترتيب: المراكز والنقاط والفوز والتعادل والخسارة وفارق الأهداف
- استخدم markdown: **bold** للأسماء والنتايج المهمة
- لو المعلومة مش مؤكدة قول كده
- اذكر المصدر لو متاح
- خلي الرد مختصر ومفيد`;
}

// --- State ---
let state = {
  apiKey: localStorage.getItem('ahly_api_key') || '',
  showKeyModal: false,
  results: {},
  loading: false,
  allLoading: false,
  activeSection: null,
  loadingMsg: '',
  error: null,
};
let loadingInterval = null;

function setState(updates) {
  Object.assign(state, updates);
  render();
}

// --- API ---
async function fetchSection(sectionId) {
  if (!state.apiKey) { setState({ showKeyModal: true }); return; }
  const section = SECTIONS_CONFIG.find(s => s.id === sectionId);
  setState({ activeSection: sectionId, loading: true, error: null });
  startLoadingMsgs();

  try {
    const query = section.queryTpl(getTodayEN(), getTodayISO());
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': state.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        system: getSystemPrompt(),
        messages: [{ role: 'user', content: query }],
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      }),
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error.message);
    const text = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n');
    state.results[sectionId] = text || 'مفيش بيانات حالياً.';
    setState({ loading: false });
  } catch (err) {
    setState({ loading: false, error: err.message });
  }
  stopLoadingMsgs();
}

async function fetchAll() {
  if (!state.apiKey) { setState({ showKeyModal: true }); return; }
  setState({ allLoading: true, loading: true, error: null });
  startLoadingMsgs();

  for (const section of SECTIONS_CONFIG) {
    setState({ activeSection: section.id });
    try {
      const query = section.queryTpl(getTodayEN(), getTodayISO());
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': state.apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1500,
          system: getSystemPrompt(),
          messages: [{ role: 'user', content: query }],
          tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        }),
      });
      const data = await resp.json();
      if (data.error) throw new Error(data.error.message);
      const text = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n');
      state.results[section.id] = text || 'مفيش بيانات حالياً.';
      render();
    } catch (err) {
      state.results[section.id] = `خطأ: ${err.message}`;
      render();
    }
  }

  setState({ loading: false, allLoading: false, activeSection: null });
  stopLoadingMsgs();
}

function startLoadingMsgs() {
  let i = 0;
  state.loadingMsg = LOADING_MSGS[0];
  clearInterval(loadingInterval);
  loadingInterval = setInterval(() => {
    i = (i + 1) % LOADING_MSGS.length;
    state.loadingMsg = LOADING_MSGS[i];
    render();
  }, 2200);
}
function stopLoadingMsgs() { clearInterval(loadingInterval); }

// --- Markdown ---
function renderMd(text) {
  if (!text) return '';
  return text.split('\n').map(line => {
    let p = line
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/\[(.*?)\]\((.*?)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

    if (line.startsWith('### ')) return `<h3>${p.slice(4)}</h3>`;
    if (line.startsWith('## ')) return `<h2>${p.slice(3)}</h2>`;
    if (line.startsWith('# ')) return `<h1>${p.slice(2)}</h1>`;
    if (line.trim() === '---') return '<hr>';
    if (line.startsWith('- ') || line.startsWith('* ')) return `<div class="bullet">${p.slice(2)}</div>`;
    if (/^\d+\.\s/.test(line)) return `<div class="numbered">${p.replace(/^\d+\.\s/,'')}</div>`;
    if (line.trim() === '') return '<div style="height:8px"></div>';
    return `<p>${p}</p>`;
  }).join('');
}

// --- Render ---
function render() {
  const app = document.getElementById('app');
  const hasResults = Object.keys(state.results).length > 0;
  const sectionCount = SECTIONS_CONFIG.length;

  let html = '';

  // API Key Modal
  if (state.showKeyModal || !state.apiKey) {
    html += `
    <div class="modal-overlay" onclick="if(event.target===this && state.apiKey) setState({showKeyModal:false})">
      <div class="modal">
        <div style="font-size:2.5rem;margin-bottom:8px">🦅</div>
        <h2>مركز أخبار الأهلي</h2>
        <p>عشان التطبيق يشتغل، محتاج مفتاح Anthropic API.<br>
        المفتاح بيتحفظ في المتصفح بتاعك بس ومش بيتبعت لأي حد تاني.</p>
        <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-..." value="${state.apiKey}" 
          onkeydown="if(event.key==='Enter') saveKey()">
        <button class="save-btn" onclick="saveKey()">⚡ حفظ وابدأ</button>
        <div class="privacy-note">🔒 المفتاح بيتحفظ في localStorage على جهازك بس.<br>مش بيتبعت لأي سيرفر خارجي.</div>
      </div>
    </div>`;
  }

  // Header
  html += `
  <div class="header">
    <button class="settings-btn" onclick="setState({showKeyModal:true})" title="إعدادات">⚙️</button>
    <div class="header-content">
      <div class="header-eagle">🦅</div>
      <h1>مركز أخبار الأهلي</h1>
      <div class="subtitle">نادي القرن · الأهلي فوق الجميع</div>
      <div class="meta">بدون إعلانات • بيانات لحظية • توقيت شرق أمريكا</div>
      <div class="date">📅 ${getTodayAr()}</div>
    </div>
  </div>`;

  // Main
  html += `<div class="main">`;

  // Fetch All
  html += `<button class="fetch-all-btn" onclick="fetchAll()" ${state.loading ? 'disabled' : ''}>
    ${state.loading && state.allLoading ? `⏳ ${state.loadingMsg}` : '⚡ جيبلي كل حاجة'}
  </button>`;

  // Section buttons
  html += `<div class="sections-grid">`;
  SECTIONS_CONFIG.forEach((s, idx) => {
    const loaded = state.results[s.id] ? ' loaded' : '';
    const isLast = idx === sectionCount - 1;
    const spanFull = sectionCount % 2 !== 0 && isLast ? ' span-full' : '';
    html += `<button class="section-btn${loaded}${spanFull}" onclick="fetchSection('${s.id}')" ${state.loading ? 'disabled' : ''}>
      <div class="icon">${s.icon}</div>
      <div>${s.label}</div>
      ${state.results[s.id] ? '<div class="dot"></div>' : ''}
    </button>`;
  });
  html += `</div>`;

  // Loading
  if (state.loading && !state.allLoading) {
    html += `<div class="loading-box"><div class="ball">⚽</div><div class="msg">${state.loadingMsg}</div></div>`;
  }

  // Error
  if (state.error) {
    html += `<div class="error-box"><strong>⚠️ خطأ:</strong> ${state.error}</div>`;
  }

  // Results
  SECTIONS_CONFIG.forEach(s => {
    if (!state.results[s.id]) return;
    html += `<div class="result-card">
      <div class="card-header">
        <span class="icon">${s.icon}</span>
        <h2>${s.label}</h2>
      </div>
      <div class="content">${renderMd(state.results[s.id])}</div>
    </div>`;
  });

  // Empty
  if (!state.loading && !hasResults) {
    html += `<div class="empty">
      <div class="big-icon">🏟️</div>
      <p>دوس على <strong style="color:var(--red)">"جيبلي كل حاجة"</strong></p>
      <p class="hint">أو اختار قسم معين من فوق</p>
    </div>`;
  }

  // Footer
  html += `<div class="footer">
    الأهلي فوق الجميع 🦅<br>
    <span style="direction:ltr;display:inline-block;margin-top:4px">Powered by Claude AI · Ad-free forever</span>
  </div>`;

  html += `</div>`; // close main

  app.innerHTML = html;
}

function saveKey() {
  const input = document.getElementById('apiKeyInput');
  if (input && input.value.trim()) {
    localStorage.setItem('ahly_api_key', input.value.trim());
    setState({ apiKey: input.value.trim(), showKeyModal: false });
  }
}

// --- PWA Service Worker Registration ---
if ('serviceWorker' in navigator) {
  // Minimal inline SW for PWA installability
  const swCode = `self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => new Response('Offline'))));`;
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

// Initial render
render();
</script>
</body>
</html>
